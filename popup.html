<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Better Browser MCP</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6e6e6e;
      --border: #d0d0d0;
      --accent: #2e7df6;
      --ok: #18a058;
      --warn: #d97706;
      --err: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1f1f1f;
        --fg: #e6e6e6;
        --muted: #a0a0a0;
        --border: #3a3a3a;
        --accent: #4d8bf7;
        --ok: #34d399;
        --warn: #fbbf24;
        --err: #f87171;
      }
    }
    * { box-sizing: border-box; }
    body {
      width: 380px;
      max-height: 540px;
      overflow-y: auto;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--fg);
    }
    h1 { font-size: 14px; margin: 0 0 8px; }
    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 12px 0 6px; }
    input, button {
      font: inherit;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    button {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button.ghost {
      background: transparent;
      color: var(--accent);
      border-color: transparent;
      padding: 2px 6px;
    }
    button.danger {
      background: transparent;
      color: var(--err);
      border-color: transparent;
      padding: 2px 6px;
    }
    .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .row > * { flex: 1; }
    .row > button { flex: 0 0 auto; }
    .agent {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
    }
    .agent.connected { border-left: 3px solid var(--ok); }
    .agent.disconnected { border-left: 3px solid var(--err); }
    .agent.connecting { border-left: 3px solid var(--warn); }
    .agent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .agent-id { font-weight: 600; }
    .agent-url { color: var(--muted); font-size: 11px; word-break: break-all; }
    .agent-meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .status { font-size: 11px; font-weight: 500; }
    .status.connected { color: var(--ok); }
    .status.disconnected { color: var(--err); }
    .status.connecting { color: var(--warn); }
    .bindings { margin-top: 6px; font-size: 11px; color: var(--muted); }
    .empty { color: var(--muted); text-align: center; padding: 16px; font-style: italic; }
    .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; }
    .add-form input.full { grid-column: 1 / -1; }
    .tab-list { margin-top: 6px; }
    .tab-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .tab-row.active { background: var(--accent); color: white; border-color: var(--accent); }
    .tab-row.active .tab-meta { color: rgba(255,255,255,0.8); }
    .tab-label { flex: 1; font-weight: 500; }
    .tab-label-input {
      flex: 1;
      padding: 2px 4px;
      font-size: 12px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 3px;
    }
    .tab-meta { color: var(--muted); font-size: 10px; }
  </style>
</head>
<body>
  <h1>Better Browser MCP</h1>

  <h2>MCP servers (agents)</h2>
  <div id="agents"></div>

  <h2>Add a new agent</h2>
  <div class="add-form">
    <input id="add-id" placeholder="agent id (e.g. hermes)" />
    <input id="add-port" type="number" placeholder="port (e.g. 9009)" />
    <input id="add-url" class="full" placeholder="or full ws:// URL (overrides port)" />
    <input id="add-token" class="full" placeholder="auth token (optional)" />
    <button id="add-submit" class="full">Add agent</button>
  </div>

  <h2>This tab</h2>
  <div id="this-tab"></div>

  <h2 id="agent-tabs-header" style="display:none">Agent's bound tabs</h2>
  <div id="agent-tabs" class="tab-list"></div>

  <script src="popup.js"></script>
</body>
</html>
